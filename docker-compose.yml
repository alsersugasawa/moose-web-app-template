version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:18-alpine
    container_name: webapp-db
    environment:
      POSTGRES_DB: webapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - webapp-network
    restart: unless-stopped

  # FastAPI Application
  web:
    # For production/updates: use image from your registry (uncomment 'image' and comment 'build')
    # image: your-org/web-platform:v1.0.0
    # For development: build from source
    build: .
    container_name: webapp-web
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/webapp
      # Email (SMTP) — leave SMTP_HOST blank to disable (prints links to stdout in dev)
      # SMTP_HOST: smtp.example.com
      # SMTP_PORT: 587
      # SMTP_USER: user@example.com
      # SMTP_PASSWORD: your-smtp-password
      # SMTP_FROM: noreply@example.com
      # SMTP_TLS: "true"
      # APP_BASE_URL: https://yourdomain.com
      # OAuth 2.0 — uncomment and set to enable social login
      # GOOGLE_CLIENT_ID: your-google-client-id
      # GOOGLE_CLIENT_SECRET: your-google-client-secret
      # GITHUB_CLIENT_ID: your-github-client-id
      # GITHUB_CLIENT_SECRET: your-github-client-secret
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./static:/app/static
      - ./migrations:/app/migrations
      - ./backups:/app/backups
      - ./certs:/app/certs
      # Optional: Enable automatic updates (advanced users only)
      # WARNING: Mounting Docker socket gives the container access to Docker daemon
      # - /var/run/docker.sock:/var/run/docker.sock
      # - ./docker-compose.yml:/app/docker-compose.yml:ro
      # To use external storage, change the path above:
      # - /your/backup/path:/app/backups
      # Optional: Mount SMB/NFS shares (uncomment and configure if using)
      # - smb_backups:/mnt/smb_backups
      # - nfs_backups:/mnt/nfs_backups
    networks:
      - webapp-network
    restart: unless-stopped

  # Caddy reverse proxy — automatic HTTPS via Let's Encrypt / ACME
  # Set CADDY_DOMAIN to your public domain for auto certificates.
  # Leave unset (defaults to "localhost") for a self-signed dev certificate.
  # Only active when started with --profile proxy (production).
  # In dev, use docker-compose.dev.yml override which exposes web directly.
  caddy:
    profiles: ["proxy"]
    image: caddy:2-alpine
    container_name: webapp-caddy
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:-localhost}
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@example.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/app/certs:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - webapp-network
    depends_on:
      - web
    restart: unless-stopped

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
  # Optional: Define SMB and NFS volumes (uncomment if using file shares)
  # smb_backups:
  #   driver: local
  #   driver_opts:
  #     type: cifs
  #     o: username=${SMB_USERNAME},password=${SMB_PASSWORD},vers=3.0
  #     device: //${SMB_HOST}/${SMB_SHARE}
  # nfs_backups:
  #   driver: local
  #   driver_opts:
  #     type: nfs
  #     o: addr=${NFS_HOST},rw
  #     device: ":${NFS_EXPORT}"

networks:
  webapp-network:
    driver: bridge
