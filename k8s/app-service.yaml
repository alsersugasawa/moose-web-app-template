apiVersion: v1
kind: Service
metadata:
  name: web-platform
  namespace: web-platform
  labels:
    app: web-platform
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: web-platform
  sessionAffinity: ClientIP  # Sticky sessions for better UX
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours
